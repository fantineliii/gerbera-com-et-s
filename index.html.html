<!-- Dev de Coração 
     O código da galáxia de flores vermelhas
     -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Feliz Dia das Flores Vermelhas | Galáxia 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', 'Quicksand', 'Fredoka One', cursive, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
        }

        /* Mensagem central */
        .greeting {
            position: absolute;
            top: 14px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            font-size: 0.85rem;
            font-weight: 600;
            color: #FF9C9C;
            text-shadow: 0 0 6px rgba(0,0,0,0.6);
            letter-spacing: 0.3px;
        }
        /* Controles e selo */
        .badge-control {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.7rem;
            pointer-events: none;
            font-weight: 500;
            color: #FF8585;
            border: 1px solid #FF858580;
            z-index: 15;
        }
        .control-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            pointer-events: none;
            white-space: nowrap;
            font-family: monospace;
            letter-spacing: 1px;
            color: #FFB3A3;
            z-index: 15;
        }
        @media (max-width: 700px) {
            .greeting { font-size: 0.7rem; top: 10px; }
            .badge-control { font-size: 0.6rem; }
            .control-hint { font-size: 0.6rem; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <!-- Mensagem -->
    <div class="greeting">🌺 Eu te amo 🌺</div>

    <div class="badge-control">🌀 360° | Galáxia de Gérberas</div>
    <div class="control-hint">🖱️ Arraste para rotacionar 360° | Zoom com scroll</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Cena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0205);
        scene.fog = new THREE.FogExp2(0x0a0205, 0.00045);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(13, 6, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        // --- Pós-processamento bloom ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.85);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 0.75;
        bloomPass.radius = 0.6;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- Controles 360° ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.0;
        controls.panSpeed = 0.5;
        controls.enableZoom = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.65;
        controls.target.set(0, 0.5, 0);

        // ---------- 1. FLORES EM FORMA DE GALÁXIA ----------
        // Texturas variadas de flores vermelhas (gérberas)
        function createFlowerTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 128, 128);
            const cx = 64, cy = 64;
            
            if (type === 0) { 
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const px = cx + Math.cos(angle) * 32;
                    const py = cy + Math.sin(angle) * 32;
                    ctx.beginPath();
                    ctx.ellipse(px, py, 22, 28, angle, 0, Math.PI * 2);
                    ctx.fillStyle = '#E63946';
                    ctx.fill();
                }
            } else if (type === 1) { 
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const px = cx + Math.cos(angle) * 38;
                    const py = cy + Math.sin(angle) * 38;
                    ctx.save();
                    ctx.translate(px, py);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 16, 30, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#D62246';
                    ctx.fill();
                    ctx.restore();
                }
            } else { // pequena estrela
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    const px = cx + Math.cos(angle) * 28;
                    const py = cy + Math.sin(angle) * 28;
                    ctx.beginPath();
                    ctx.ellipse(px, py, 14, 18, angle, 0, Math.PI * 2);
                    ctx.fillStyle = '#FF5C5C';
                    ctx.fill();
                }
            }
            // centro comum (típico das gérberas: disco escuro)
            ctx.beginPath();
            ctx.arc(cx, cy, 16, 0, 2 * Math.PI);
            ctx.fillStyle = '#3D1F12';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx, cy, 10, 0, 2 * Math.PI);
            ctx.fillStyle = '#1F1009';
            ctx.fill();
            ctx.fillStyle = '#FFD9A0';
            for (let i=0; i<20; i++) {
                const rad = Math.random() * 12;
                const ang = Math.random() * Math.PI * 2;
                const x = cx + Math.cos(ang) * rad;
                const y = cy + Math.sin(ang) * rad;
                ctx.beginPath();
                ctx.arc(x, y, 1.2, 0, 2*Math.PI);
                ctx.fill();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        const flowerTextures = [
            createFlowerTexture(0),
            createFlowerTexture(1),
            createFlowerTexture(2)
        ];

        const TOTAL_FLOWERS = 18500;
        const positions = new Float32Array(TOTAL_FLOWERS * 3);
        const colors = new Float32Array(TOTAL_FLOWERS * 3);
        const sizes = new Float32Array(TOTAL_FLOWERS);
        const texIndices = new Float32Array(TOTAL_FLOWERS);

        const arms = 4;
        const spiralTightness = 2.6;
        const armSpread = 0.58;
        const innerRadius = 1.0;
        const outerRadius = 16.2;

        for (let i = 0; i < TOTAL_FLOWERS; i++) {
            let radius, angle, yOffset;
            const isCore = Math.random() < 0.2;
            if (isCore) {
                radius = Math.pow(Math.random(), 1.3) * 3.8;
                angle = Math.random() * Math.PI * 2;
                yOffset = (Math.random() - 0.5) * 1.9 * (1 - radius / 5);
            } else {
                const armIdx = Math.floor(Math.random() * arms);
                const armAngleOffset = (armIdx / arms) * Math.PI * 2;
                const t = Math.pow(Math.random(), 1.1);
                radius = innerRadius + t * (outerRadius - innerRadius);
                const spiralAngle = spiralTightness * Math.log(radius + 0.6) + armAngleOffset;
                const randomAngleOffset = (Math.random() - 0.5) * armSpread * (1 + radius * 0.08);
                angle = spiralAngle + randomAngleOffset;
                yOffset = Math.sin(radius * 1.4 + armIdx) * 0.85 + (Math.random() - 0.5) * 0.8;
                if (Math.random() > 0.7) yOffset += (Math.random() - 0.5) * 0.9;
            }
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = yOffset * 1.3;
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            const distFactor = Math.min(1, Math.sqrt(x*x + y*y + z*z) / 14);
            let r = 0.88 + Math.random() * 0.12, g = 0.08 + Math.random() * 0.14, b = 0.10 + Math.random() * 0.14;
            if (distFactor < 0.3) { r = 0.7 + Math.random()*0.15; g = 0.04; b = 0.05; }
            if (distFactor > 0.7) { r = 1.0; g = 0.22 + Math.random()*0.12; b = 0.20; }
            colors[i*3] = r;
            colors[i*3+1] = g;
            colors[i*3+2] = b;
            
            let sizeVal = 0.28 + Math.random() * 0.48;
            if (distFactor < 0.3) sizeVal *= 0.85;
            if (distFactor > 0.8) sizeVal *= 1.25;
            if (Math.random() > 0.93) sizeVal *= 1.55;
            sizes[i] = sizeVal;
            texIndices[i] = Math.floor(Math.random() * flowerTextures.length);
        }

        const flowerGeometry = new THREE.BufferGeometry();
        flowerGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        flowerGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        flowerGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        flowerGeometry.setAttribute('texIndex', new THREE.BufferAttribute(texIndices, 1));

        const vertexShader = `
            attribute float size;
            attribute vec3 color;
            attribute float texIndex;
            varying vec3 vColor;
            varying float vTexIndex;
            void main() {
                vColor = color;
                vTexIndex = texIndex;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * ( 300.0 / ( - mvPosition.z ) ) * 0.95;
                gl_PointSize = clamp(gl_PointSize, 7.0, 48.0);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            uniform sampler2D uTextures[3];
            varying vec3 vColor;
            varying float vTexIndex;
            void main() {
                int idx = int(round(vTexIndex));
                vec4 texColor;
                if (idx == 0) texColor = texture2D(uTextures[0], gl_PointCoord);
                else if (idx == 1) texColor = texture2D(uTextures[1], gl_PointCoord);
                else texColor = texture2D(uTextures[2], gl_PointCoord);
                if (texColor.a < 0.2) discard;
                vec3 finalColor = vColor * texColor.rgb;
                finalColor += vec3(0.18, 0.03, 0.03);
                gl_FragColor = vec4(finalColor, texColor.a * 0.95);
            }
        `;

        const flowerMaterial = new THREE.ShaderMaterial({
            uniforms: { uTextures: { value: flowerTextures } },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const flowerPoints = new THREE.Points(flowerGeometry, flowerMaterial);
        scene.add(flowerPoints);

        // ---------- 2. RAMOS DE GÉRBERAS VERMELHAS EM 3D ----------
        // Função para criar uma gérbera individual (caule, folhas, flor com pétalas)
        function createGerbera(x, z, yOffset = 0, scaleFactor = 1.0) {
            const group = new THREE.Group();
            
            // Caule
            const stemGeo = new THREE.CylinderGeometry(0.12 * scaleFactor, 0.18 * scaleFactor, 1.1 * scaleFactor, 6);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x5a9e4e, roughness: 0.6, metalness: 0.1 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.y = -0.55 * scaleFactor;
            group.add(stem);
            
            // Folhas
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x6ab04c });
            const leaf1Geo = new THREE.BoxGeometry(0.35 * scaleFactor, 0.08 * scaleFactor, 0.2 * scaleFactor);
            const leaf1 = new THREE.Mesh(leaf1Geo, leafMat);
            leaf1.position.set(0.25 * scaleFactor, -0.3 * scaleFactor, 0);
            leaf1.rotation.z = 0.5;
            group.add(leaf1);
            
            const leaf2 = new THREE.Mesh(leaf1Geo, leafMat);
            leaf2.position.set(-0.25 * scaleFactor, -0.3 * scaleFactor, 0);
            leaf2.rotation.z = -0.5;
            group.add(leaf2);
            
            // Centro da flor (disco escuro, característico da gérbera)
            const centerGeo = new THREE.SphereGeometry(0.28 * scaleFactor, 16, 16);
            const centerMat = new THREE.MeshStandardMaterial({ color: 0x2b1a14, emissive: 0x150d09, emissiveIntensity: 0.2 });
            const center = new THREE.Mesh(centerGeo, centerMat);
            center.position.y = 0.1 * scaleFactor;
            group.add(center);
            
            // Pétalas vermelhas ao redor (12 pétalas planas)
            const petalMat = new THREE.MeshStandardMaterial({ color: 0xd62246, emissive: 0xaa1530, emissiveIntensity: 0.25 });
            for (let i = 0; i < 14; i++) {
                const angle = (i / 14) * Math.PI * 2;
                const petalGeo = new THREE.CylinderGeometry(0.22 * scaleFactor, 0.24 * scaleFactor, 0.6 * scaleFactor, 5);
                const petal = new THREE.Mesh(petalGeo, petalMat);
                petal.position.x = Math.cos(angle) * 0.48 * scaleFactor;
                petal.position.z = Math.sin(angle) * 0.48 * scaleFactor;
                petal.position.y = 0.05 * scaleFactor;
                petal.rotation.z = angle;
                petal.rotation.x = 0.4;
                group.add(petal);
            }
            // Segunda camada de pétalas menores
            for (let i = 0; i < 10; i++) {
                const angle = (i / 10) * Math.PI * 2 + 0.3;
                const petalGeo = new THREE.CylinderGeometry(0.16 * scaleFactor, 0.18 * scaleFactor, 0.5 * scaleFactor, 5);
                const petal = new THREE.Mesh(petalGeo, petalMat);
                petal.position.x = Math.cos(angle) * 0.62 * scaleFactor;
                petal.position.z = Math.sin(angle) * 0.62 * scaleFactor;
                petal.position.y = 0.02 * scaleFactor;
                petal.rotation.z = angle;
                petal.rotation.x = 0.3;
                group.add(petal);
            }
            
            group.position.set(x, yOffset, z);
            // Rotação aleatória para que nem todas fiquem na mesma direção
            group.rotation.y = Math.random() * Math.PI * 2;
            return group;
        }
        
        const gerberaPositions = [];
        // Núcleo: algumas ao redor
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const radius = 1.8 + Math.random() * 1.2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            gerberaPositions.push({ x, z, y: -0.2 + Math.random() * 0.5, scale: 0.9 + Math.random() * 0.3 });
        }
        // Braços espirais
        const armAngles = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
        for (let a = 0; a < armAngles.length; a++) {
            for (let r = 3.5; r <= 12; r += 2.2) {
                const angleOffset = armAngles[a];
                const spiralBase = spiralTightness * Math.log(r + 0.8);
                const angle = spiralBase + angleOffset + (Math.random() - 0.5) * 0.8;
                const x = Math.cos(angle) * r;
                const z = Math.sin(angle) * r;
                const y = Math.sin(r * 1.2) * 0.4 + (Math.random() - 0.5) * 0.4;
                gerberaPositions.push({ x, z, y: y - 0.1, scale: 0.8 + Math.random() * 0.5 });
            }
        }
        // Ramos adicionais flutuantes
        for (let i = 0; i < 12; i++) {
            const rad = 6 + Math.random() * 7;
            const ang = Math.random() * Math.PI * 2;
            const x = Math.cos(ang) * rad;
            const z = Math.sin(ang) * rad;
            const y = (Math.random() - 0.5) * 1.2;
            gerberaPositions.push({ x, z, y: y, scale: 0.7 + Math.random() * 0.6 });
        }
        
        const gerberasGroup = new THREE.Group();
        gerberaPositions.forEach(pos => {
            const gerbera = createGerbera(pos.x, pos.z, pos.y, pos.scale);
            gerberasGroup.add(gerbera);
        });
        scene.add(gerberasGroup);
        
        // Adicionar algumas partículas de pólen ao redor das gérberas (efeito de brilho)
        const pollenCount = 1800;
        const pollenPositions = new Float32Array(pollenCount * 3);
        for (let i = 0; i < pollenCount; i++) {
            const idx = Math.floor(Math.random() * gerberaPositions.length);
            const base = gerberaPositions[idx];
            const offsetX = (Math.random() - 0.5) * 1.2;
            const offsetZ = (Math.random() - 0.5) * 1.2;
            const offsetY = (Math.random() - 0.5) * 1.0;
            pollenPositions[i*3] = base.x + offsetX;
            pollenPositions[i*3+1] = base.y + offsetY + 0.2;
            pollenPositions[i*3+2] = base.z + offsetZ;
        }
        const pollenGeo = new THREE.BufferGeometry();
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPositions, 3));
        const pollenMat = new THREE.PointsMaterial({ color: 0xff9a8a, size: 0.05, transparent: true, blending: THREE.AdditiveBlending });
        const pollenPoints = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenPoints);
        
        // ---------- 3. ELEMENTOS DE FUNDO: ESTRELAS E POEIRA ----------
        const starCount = 4500;
        const starPositionsArr = new Float32Array(starCount * 3);
        const starColorsArr = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const rad = 40 + Math.random() * 55;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositionsArr[i*3] = rad * Math.sin(phi) * Math.cos(theta);
            starPositionsArr[i*3+1] = rad * Math.sin(phi) * Math.sin(theta) * 0.5;
            starPositionsArr[i*3+2] = rad * Math.cos(phi);
            const intens = 0.4 + Math.random() * 0.8;
            starColorsArr[i*3] = intens * (Math.random() > 0.6 ? 1.0 : 0.85);
            starColorsArr[i*3+1] = intens * (Math.random() > 0.5 ? 0.5 : 0.35);
            starColorsArr[i*3+2] = intens * 0.4;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositionsArr, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColorsArr, 3));
        const starMatObj = new THREE.PointsMaterial({ size: 0.16, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const starsField = new THREE.Points(starGeo, starMatObj);
        scene.add(starsField);
        
        const dustCount = 8000;
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            const radius = 5 + Math.random() * 14;
            const ang = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 4.5;
            dustPositions[i*3] = Math.cos(ang) * radius * (0.6 + Math.random() * 0.7);
            dustPositions[i*3+1] = y + (Math.random() - 0.5) * 1.5;
            dustPositions[i*3+2] = Math.sin(ang) * radius * (0.6 + Math.random() * 0.7);
        }
        const dustGeoObj = new THREE.BufferGeometry();
        dustGeoObj.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMatObj = new THREE.PointsMaterial({ color: 0xff5544, size: 0.055, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const dustCloud = new THREE.Points(dustGeoObj, dustMatObj);
        scene.add(dustCloud);
        
        // ---------- 4. NÚCLEO BRILHANTE E HALO ----------
        const coreGlow = new THREE.Mesh(
            new THREE.SphereGeometry(1.4, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xcc0022, emissiveIntensity: 1.6, roughness: 0.2 })
        );
        scene.add(coreGlow);
        
        const haloCount = 1500;
        const haloPositions = new Float32Array(haloCount * 3);
        for (let i = 0; i < haloCount; i++) {
            const rad = 1.8 + Math.random() * 2.2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            haloPositions[i*3] = rad * Math.sin(phi) * Math.cos(theta);
            haloPositions[i*3+1] = rad * Math.sin(phi) * Math.sin(theta) * 0.7;
            haloPositions[i*3+2] = rad * Math.cos(phi);
        }
        const haloGeo = new THREE.BufferGeometry();
        haloGeo.setAttribute('position', new THREE.BufferAttribute(haloPositions, 3));
        const haloMatPoints = new THREE.PointsMaterial({ color: 0xff7777, size: 0.08, blending: THREE.AdditiveBlending });
        const haloRing = new THREE.Points(haloGeo, haloMatPoints);
        scene.add(haloRing);
        
        // Luzes
        const ambientLight = new THREE.AmbientLight(0x220505);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff5555, 1.2, 30);
        pointLight.position.set(2, 1.5, 2);
        scene.add(pointLight);
        const backLight = new THREE.PointLight(0xff6666, 0.7);
        backLight.position.set(-3, 2, -5);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xff8888, 0.6);
        fillLight.position.set(1, 3, 3);
        scene.add(fillLight);

        function loadMemoryImage(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = src;
            });
        }

        // Desenha a imagem cortando/escalando para cobrir o retângulo de destino (como background-size: cover)
        function drawImageCover(ctx, img, dx, dy, dw, dh) {
            const destRatio = dw / dh;
            const srcRatio = img.width / img.height;
            let sx, sy, sw, sh;
            if (srcRatio > destRatio) {
                sh = img.height;
                sw = sh * destRatio;
                sx = (img.width - sw) / 2;
                sy = 0;
            } else {
                sw = img.width;
                sh = sw / destRatio;
                sx = 0;
                sy = (img.height - sh) / 2;
            }
            ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
        }

        function roundRectPath(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function heartPath(ctx, x, y, width, height) {
            const topCurveHeight = height * 0.32;
            ctx.beginPath();
            ctx.moveTo(x, y + topCurveHeight);
            ctx.bezierCurveTo(x, y, x - width / 2, y, x - width / 2, y + topCurveHeight);
            ctx.bezierCurveTo(x - width / 2, y + (height + topCurveHeight) / 2, x, y + (height + topCurveHeight) / 2, x, y + height);
            ctx.bezierCurveTo(x, y + (height + topCurveHeight) / 2, x + width / 2, y + (height + topCurveHeight) / 2, x + width / 2, y + topCurveHeight);
            ctx.bezierCurveTo(x + width / 2, y, x, y, x, y + topCurveHeight);
            ctx.closePath();
        }

        // Foto estilo polaroid (moldura branca + selo de coração)
        function createPolaroidCanvas(img, size = 280) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size * 1.18;
            const ctx = canvas.getContext('2d');
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.55)';
            ctx.shadowBlur = size * 0.05;
            roundRectPath(ctx, 0, 0, canvas.width, canvas.height, size * 0.04);
            ctx.fillStyle = '#fffaf5';
            ctx.fill();
            ctx.restore();
            const pad = size * 0.07;
            drawImageCover(ctx, img, pad, pad, size - pad * 2, size - pad * 2);
            ctx.fillStyle = '#FF4F6E';
            ctx.font = `${size * 0.13}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('♥', canvas.width / 2, size + (canvas.height - size) / 2);
            return canvas;
        }

        // Foto em formato de coração com brilho ao redor
        function createHeartCanvas(img, size = 300) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const hx = size / 2, hy = size * 0.1, hw = size * 0.88, hh = size * 0.82;
            ctx.save();
            heartPath(ctx, hx, hy, hw, hh);
            ctx.clip();
            drawImageCover(ctx, img, 0, 0, size, size);
            ctx.restore();
            ctx.save();
            heartPath(ctx, hx, hy, hw, hh);
            ctx.lineWidth = size * 0.028;
            ctx.strokeStyle = '#fff5f5';
            ctx.shadowColor = '#FF6B6B';
            ctx.shadowBlur = size * 0.06;
            ctx.stroke();
            ctx.restore();
            return canvas;
        }

        function createMemorySprite(canvas) {
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false, opacity: 0 });
            const sprite = new THREE.Sprite(material);
            scene.add(sprite);
            return sprite;
        }

        let memorySprites = [];
        Promise.all([loadMemoryImage(MEMORY_PHOTO_1), loadMemoryImage(MEMORY_PHOTO_2)]).then(([img1, img2]) => {
            const sourceImages = [img1, img2];
            const NUM_MEMORIES = 10;
            for (let i = 0; i < NUM_MEMORIES; i++) {
                const img = sourceImages[i % sourceImages.length];
                const isHeart = (i % 2 === 0);
                const canvas = isHeart ? createHeartCanvas(img, 300) : createPolaroidCanvas(img, 280);
                const sprite = createMemorySprite(canvas);
                memorySprites.push({
                    sprite,
                    angle: Math.random() * Math.PI * 2,
                    tilt: 0.2 + Math.random() * 0.4,
                    maxDist: 6.5 + Math.random() * 7,
                    jumpHeight: 3 + Math.random() * 3.5,
                    baseScale: 1.7 + Math.random() * 1.2,
                    cycleDuration: 7 + Math.random() * 6,
                    offset: Math.random() * 25,
                    aspect: canvas.width / canvas.height
                });
            }
        });

        function updateMemorySprites(time) {
            const activeFraction = 0.62;
            memorySprites.forEach(m => {
                const cyclePos = ((time + m.offset) % m.cycleDuration) / m.cycleDuration;
                if (cyclePos > activeFraction) {
                    m.sprite.material.opacity = 0;
                    return;
                }
                const u = cyclePos / activeFraction;
                const easeOut = Math.sin(u * Math.PI / 2);
                const envelope = Math.sin(u * Math.PI);
                const dist = m.maxDist * easeOut;
                const x = Math.cos(m.angle) * dist;
                const z = Math.sin(m.angle) * dist;
                const y = 0.5 + envelope * m.jumpHeight + m.tilt;
                m.sprite.position.set(x, y, z);

                let opacity;
                if (u < 0.12) opacity = u / 0.12;
                else if (u > 0.82) opacity = (1 - u) / (1 - 0.82);
                else opacity = 1;
                m.sprite.material.opacity = Math.max(0, Math.min(1, opacity));

                const scale = m.baseScale * (0.35 + 0.65 * envelope);
                m.sprite.scale.set(scale * m.aspect, scale, 1);
            });
        }

        // ---------- ANIMAÇÃO E ROTAÇÕES ----------
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            const intensity = 1.4 + Math.sin(time * 2.5) * 0.4;
            coreGlow.material.emissiveIntensity = intensity;
            pointLight.intensity = 0.9 + Math.sin(time * 2.2) * 0.25;
            
            dustCloud.rotation.y = time * 0.03;
            starsField.rotation.x = Math.sin(time * 0.05) * 0.05;
            starsField.rotation.y = time * 0.01;
            haloRing.rotation.y = time * 0.1;
            haloRing.rotation.x = Math.sin(time * 0.2) * 0.1;
            pollenPoints.rotation.y = time * 0.02;
            
            // Fazer com que as gérberas tenham um leve movimento de balanço
            gerberasGroup.children.forEach((gerbera, idx) => {
                gerbera.rotation.z = Math.sin(time * 1.2 + idx) * 0.03;
                gerbera.rotation.x = Math.cos(time * 1.0 + idx) * 0.02;
            });
            
            updateMemorySprites(time);

            controls.update();
            effectComposer.render();
        }
        animate();
        
        // Redimensionamento
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('🌺 Galáxia de Gérberas Vermelhas - Feliz Dia das Flores Vermelhas');
    </script>
